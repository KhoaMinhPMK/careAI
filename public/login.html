<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng nhập – CareAI</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-body">
  <div class="login-container">
    <div class="login-hero">
      <div class="login-hero-content">
        <h2>CareAI</h2>
        <p>Hệ thống kiểm định chất lượng dữ liệu EHR dinh dưỡng nhi — được hỗ trợ bởi trí tuệ nhân tạo</p>
        <div class="login-hero-badge">🏥 HSIL Hackathon 2026 — Harvard T.H. Chan SPH</div>
      </div>
    </div>
    <div class="login-card">
      <div class="login-logo">
        <div class="logo-circle" data-icon="stethoscope" data-icon-size="32"></div>
        <h1>CareAI</h1>
        <p class="login-subtitle" data-i18n="login.subtitle">Hệ thống kiểm định chất lượng dữ liệu EHR dinh dưỡng nhi</p>
      </div>

      <form id="login-form" onsubmit="return handleLogin(event)">
        <div class="form-group">
          <label for="username" data-i18n="login.username">Tên đăng nhập</label>
          <div class="input-wrapper">
            <span class="icon" data-icon="user" data-icon-size="16"></span>
            <input type="text" id="username" placeholder="admin" autocomplete="username" value="admin">
          </div>
        </div>
        <div class="form-group">
          <label for="password" data-i18n="login.password">Mật khẩu</label>
          <div class="input-wrapper">
            <span class="icon" data-icon="lock" data-icon-size="16"></span>
            <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" value="admin">
          </div>
        </div>
        <div id="login-error" class="login-error" style="display:none;"></div>
        <button type="submit" class="btn btn-primary btn-full" id="login-btn">
          <span data-icon="login" data-icon-size="16"></span>
          <span data-i18n="login.submit">Đăng nhập</span>
        </button>
      </form>

      <div class="login-footer">
        <p data-i18n="login.demo_note">Demo: admin / admin</p>
        <p class="login-credits">HSIL Hackathon 2026 — Harvard T.H. Chan SPH</p>
      </div>
    </div>
  </div>

  <script src="js/icons.js"></script>
  <script>
    function handleLogin(e) {
      e.preventDefault();
      const u = document.getElementById('username').value;
      const p = document.getElementById('password').value;
      if (u === 'admin' && p === 'admin') {
        sessionStorage.setItem('careai_user', JSON.stringify({
          name: 'BS. Nguyễn Thị Huyên',
          role: 'Bác sĩ Dinh dưỡng',
          ward: 'Nhi Tiêu hóa'
        }));
        window.location.href = 'dashboard.html';
      } else {
        const err = document.getElementById('login-error');
        err.textContent = 'Sai tên đăng nhập hoặc mật khẩu';
        err.style.display = 'block';
      }
      return false;
    }
    // If already logged in, redirect
    if (sessionStorage.getItem('careai_user')) {
      window.location.href = 'dashboard.html';
    }
  </script>
</body>
</html>
